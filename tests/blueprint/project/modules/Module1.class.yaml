description: Class description


# ================================================================================================
# Inheritance
# ================================================================================================
inherits:
  # ------------------------
  - type: base::BaseModule
    visibility: public
    virtual: false
  # ------------------------
  - type: interfaces::IModule
    visibility: public
    virtual: true


# ================================================================================================
# Constructors
# ================================================================================================
constructors:
  - description: Constructor description
    params: []


# ================================================================================================
# Members
# ================================================================================================
members:
  # ------------------------
  - name: id
    description: Member description
    visibility: private
    type: int
    indirection: "*"
    const: true
    volatile: false
    default: "nullptr"
  # ------------------------
  - name: name
    description: Member description
    visibility: public
    type: std::string
  # ------------------------


# ================================================================================================
# Methods
# ================================================================================================
methods:
  # ------------------------
  - name: Start
    description: Method description
    visibility: public
    type: void
  # ------------------------
  - name: SetName
    description: Method description
    visibility: protected
    type: void
    indirection: "*"
    const: true
    volatile: true
    immutable: true
    noexcept: true
    override: true
    params:
      # ------------------------
      - name: new_name
        description: Param description
        type: std::string
        const: true
        indirection: "&"
      # ------------------------
      - name: flag
        description: Param description
        type: int
      # ------------------------
  # ------------------------
